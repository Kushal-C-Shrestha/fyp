server {
    listen 80;
    server_name _;

    # Allow large uploads (match multer limits)
    client_max_body_size 50M;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://server:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ── Local file uploads (only used when USE_AWS=false) ─────────────────────
    location /uploads/ {
        proxy_pass         http://server:5000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Socket.io — must upgrade HTTP → WebSocket ─────────────────────────────
    location /socket.io/ {
        proxy_pass             http://server:5000/socket.io/;
        proxy_http_version     1.1;
        proxy_set_header       Upgrade    $http_upgrade;
        proxy_set_header       Connection "upgrade";
        proxy_set_header       Host       $host;
        proxy_set_header       X-Real-IP  $remote_addr;
        proxy_cache_bypass     $http_upgrade;
        # Keep long-lived WebSocket connections alive
        proxy_read_timeout     86400s;
        proxy_send_timeout     86400s;
    }

    # ── React SPA (everything else) ───────────────────────────────────────────
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        # React Router: unknown paths fall back to index.html
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for Vite-hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files  $uri =404;
    }
}
